<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Proxy Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Proxy Generator</h1>

  <input type="text" id="host" placeholder="Host (IP)">
  <input type="text" id="port" placeholder="Port">
  <input type="text" id="username" placeholder="Base Username">
  <input type="text" id="password" placeholder="Password">

  <input type="text" id="country" placeholder="Country Code (US, GB, DE)">
  <input type="number" id="sessionTime" placeholder="Session Time (e.g. 30)">
  <input type="number" id="count" placeholder="Number of Proxies">

  <button onclick="generate()">Generate</button>

  <textarea id="output" placeholder="Generated proxies will appear here"></textarea>
  <button onclick="copy()">Copy All</button>
</div>

<script src="script.js"></script>
</body>
</html>
