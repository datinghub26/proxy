<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Proxy Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
  <h1>🌐 Proxy Generator</h1>

  <div class="grid">
    <input type="text" id="host" placeholder="Host (IP)">
    <input type="text" id="port" placeholder="Port">
    <input type="text" id="username" placeholder="Base Username">
    <input type="text" id="password" placeholder="Password">

    <input type="text" id="country" placeholder="Country (US, GB)">
    <input type="number" id="sessionTime" placeholder="Session Time">
    <input type="number" id="count" placeholder="Amount">
  </div>

  <div class="buttons">
    <button onclick="generate()">Generate</button>
    <button onclick="checkAllIPs()">Check Fraud Score</button>
    <button onclick="copy()">Copy</button>
  </div>

  <textarea id="output" placeholder="Generated proxies..."></textarea>
</div>

<script src="script.js"></script>
</body>
</html>
